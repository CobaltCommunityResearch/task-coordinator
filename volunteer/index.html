<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Sign-Up — Task Coordinator</title>
<style>
  :root {
    --cobalt: #1B5E8B;
    --cobalt-dark: #144870;
    --cobalt-light: #2E7FB8;
    --cobalt-pale: #EBF4FB;
    --teal: #2E9BC0;
    --green: #27AE60;
    --green-pale: #EAF7EE;
    --orange: #E67E22;
    --red: #E74C3C;
    --red-pale: #FDEDEC;
    --text: #2C3E50;
    --text-muted: #7F8C8D;
    --bg: #F0F4F8;
    --card: #FFFFFF;
    --border: #D5DDE5;
    --shadow: 0 2px 8px rgba(27,94,139,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--cobalt); color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; letter-spacing: 0.5px; }
  .logo-icon { width: 32px; height: 32px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .header-badge { background: var(--teal); color: white; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; letter-spacing: 0.5px; text-transform: uppercase; }

  main { max-width: 820px; margin: 0 auto; padding: 32px 20px; }

  /* Task hero */
  .task-hero { background: white; border-radius: 14px; padding: 28px 32px; box-shadow: var(--shadow); border: 1.5px solid var(--border); margin-bottom: 28px; }
  .task-hero-top { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 16px; }
  .task-hero-icon { width: 52px; height: 52px; background: var(--cobalt-pale); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
  .task-hero-name { font-size: 24px; font-weight: 800; color: var(--cobalt); line-height: 1.2; margin-bottom: 6px; }
  .task-hero-desc { font-size: 15px; color: var(--text-muted); line-height: 1.5; }
  .task-hero-meta { display: flex; flex-wrap: wrap; gap: 18px; padding-top: 14px; border-top: 1.5px solid var(--border); }
  .task-hero-meta-item { display: flex; align-items: center; gap: 7px; font-size: 14px; color: var(--text-muted); }
  .task-hero-meta-item strong { color: var(--text); }

  /* Section label */
  .section-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--cobalt); margin-bottom: 14px; }

  /* Slot grid */
  .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; margin-bottom: 32px; }
  .slot-card { background: white; border-radius: 12px; border: 2px solid var(--border); padding: 20px; box-shadow: var(--shadow); transition: all 0.15s; cursor: pointer; position: relative; }
  .slot-card:hover:not(.slot-full) { border-color: var(--cobalt-light); box-shadow: 0 4px 16px rgba(27,94,139,0.15); transform: translateY(-1px); }
  .slot-card.slot-full { opacity: 0.6; cursor: default; }
  .slot-card.selected { border-color: var(--cobalt); background: var(--cobalt-pale); }
  .slot-date { font-size: 13px; font-weight: 700; color: var(--cobalt); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .slot-time { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
  .slot-label-text { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
  .slot-avail { display: flex; align-items: center; gap: 7px; font-size: 13px; margin-bottom: 14px; }
  .avail-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-open { background: var(--green); }
  .dot-full { background: var(--orange); }
  .slot-btn { width: 100%; padding: 9px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
  .slot-btn-open { background: var(--cobalt); color: white; }
  .slot-btn-open:hover { background: var(--cobalt-dark); }
  .slot-btn-full { background: #f0f0f0; color: #aaa; cursor: not-allowed; }
  .full-badge { position: absolute; top: 12px; right: 12px; background: #FFF3E0; color: var(--orange); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }

  /* Sign-up form */
  .form-card { background: white; border-radius: 14px; padding: 28px 32px; box-shadow: var(--shadow); border: 2px solid var(--cobalt); margin-bottom: 28px; display: none; }
  .form-card.visible { display: block; }
  .form-card-title { font-size: 18px; font-weight: 700; color: var(--cobalt); margin-bottom: 4px; }
  .form-card-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; }
  .slot-selected-banner { background: var(--cobalt-pale); border: 1.5px solid var(--cobalt-light); border-radius: 8px; padding: 12px 16px; margin-bottom: 22px; }
  .slot-selected-banner .ssb-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--cobalt); margin-bottom: 2px; }
  .slot-selected-banner .ssb-value { font-size: 15px; font-weight: 600; color: var(--text); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; font-weight: 600; color: var(--text); }
  label .req { color: var(--red); margin-left: 2px; }
  input, select { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); background: white; transition: border-color 0.15s; }
  input:focus, select:focus { outline: none; border-color: var(--cobalt-light); box-shadow: 0 0 0 3px rgba(27,94,139,0.08); }
  input.err { border-color: var(--red); }
  .form-note { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .form-actions { display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; }
  .btn-submit { background: var(--green); color: white; padding: 12px 28px; border-radius: 9px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
  .btn-submit:hover { background: #219a52; }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-cancel { background: white; color: var(--text-muted); padding: 12px 20px; border-radius: 9px; font-size: 15px; font-weight: 600; border: 1.5px solid var(--border); cursor: pointer; }
  .btn-cancel:hover { background: var(--bg); }

  /* Confirmation */
  .confirm-card { background: white; border-radius: 14px; padding: 48px 32px; box-shadow: var(--shadow); text-align: center; display: none; }
  .confirm-card.visible { display: block; }
  .confirm-icon { width: 72px; height: 72px; background: var(--green-pale); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 36px; }
  .confirm-title { font-size: 26px; font-weight: 800; color: var(--green); margin-bottom: 10px; }
  .confirm-body { font-size: 16px; color: var(--text); margin-bottom: 6px; }
  .confirm-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.6; }
  .confirm-detail { background: var(--cobalt-pale); border-radius: 10px; padding: 18px 24px; display: inline-block; text-align: left; margin-bottom: 28px; }
  .confirm-detail-row { display: flex; align-items: center; gap: 10px; font-size: 14px; padding: 4px 0; }
  .confirm-detail-row .icon { font-size: 16px; }
  .btn-new { background: var(--cobalt); color: white; padding: 11px 24px; border-radius: 9px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }
  .btn-new:hover { background: var(--cobalt-dark); }

  /* Loading / error / empty */
  .loading { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 80px 20px; color: var(--text-muted); font-size: 15px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--cobalt); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-card { background: var(--red-pale); border: 1.5px solid var(--red); border-radius: 12px; padding: 32px; text-align: center; }
  .error-card .error-title { font-size: 20px; font-weight: 700; color: var(--red); margin-bottom: 8px; }
  .error-card p { color: var(--text-muted); font-size: 14px; }

  @media (max-width: 560px) {
    .form-grid { grid-template-columns: 1fr; }
    .task-hero { padding: 20px; }
    .form-card { padding: 20px; }
    main { padding: 20px 14px; }
    .task-hero-name { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10" cy="10" r="8" fill="#1B5E8B"/>
        <path d="M6 10.5l2.5 2.5L14 7.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    COBALT TASK COORDINATOR
  </div>
  <span class="header-badge">Volunteer Sign-Up</span>
</header>

<main id="mainContent">
  <div class="loading"><div class="spinner"></div>Loading task details…</div>
</main>

<script>
const API     = 'https://api.airtable.com/v0/appYbHmtPyK774opi';
const T_TASKS   = 'tbl6xSrJDzqkqfoWV';
const T_SLOTS   = 'tbldHqearqUupOy89';
const T_VOLS    = 'tbl0ipFgLigRxqgfV';
const T_SIGNUPS = 'tblyEHfdaPLJXTYIh';

const params  = new URLSearchParams(window.location.search);
const taskId  = params.get('taskId');
// Token passed in URL by coordinator (or cached from previous visit on same device)
const TOKEN   = params.get('tok') || localStorage.getItem('tc_airtable_token') || '';
if (params.get('tok')) localStorage.setItem('tc_airtable_token', params.get('tok'));
let taskData  = null;
let allSlots  = [];
let slotSignupCounts = {};
let selectedSlot = null;

async function atGet(table, qs = '') {
  const r = await fetch(`${API}/${table}${qs ? '?'+qs : ''}`, {
    headers: { Authorization: `Bearer ${TOKEN}` }
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message || 'Airtable error');
  return d;
}

async function atPost(table, fields) {
  const r = await fetch(`${API}/${table}`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message || 'Airtable error');
  return d;
}

async function init() {
  if (!TOKEN) {
    showError('Link expired or invalid.', 'This sign-up link is missing required credentials. Please request a fresh link from your coordinator.');
    return;
  }
  if (!taskId) {
    showError('No task specified.', 'This link does not include a task ID. Please check with your coordinator for the correct sign-up link.');
    return;
  }
  try {
    // Load task
    const td = await atGet(T_TASKS, `filterByFormula=RECORD_ID()="${taskId}"`);
    if (!td.records || !td.records.length) {
      showError('Task not found.', 'The task linked to this URL could not be found. It may have been removed. Please contact your coordinator.');
      return;
    }
    taskData = td.records[0];

    // Load slots for this task
    const sd = await atGet(T_SLOTS, `filterByFormula=FIND("${taskId}",ARRAYJOIN({Task},","))&sort[0][field]=Start%20Date%2FTime&sort[0][direction]=asc`);
    allSlots = sd.records || [];

    // Count signups per slot
    if (allSlots.length) {
      const slotIds = allSlots.map(s => s.id);
      const formula = 'OR(' + slotIds.map(id => `FIND("${id}",ARRAYJOIN({Time Slot},","))`).join(',') + ')';
      const sud = await atGet(T_SIGNUPS, `filterByFormula=${encodeURIComponent(formula)}`);
      for (const su of (sud.records || [])) {
        const slotId = (su.fields['Time Slot'] || [])[0];
        if (slotId) slotSignupCounts[slotId] = (slotSignupCounts[slotId] || 0) + 1;
      }
    }

    renderPortal();
  } catch(e) {
    showError('Could not load task.', `Error: ${e.message}`);
  }
}

function renderPortal() {
  const f = taskData.fields;
  const totalSlots = allSlots.length;

  document.getElementById('mainContent').innerHTML = `
    <div class="task-hero">
      <div class="task-hero-top">
        <div class="task-hero-icon">🌿</div>
        <div>
          <div class="task-hero-name">${esc(f['Task Name'] || 'Task')}</div>
          <div class="task-hero-desc">${esc(f.Description || '')}</div>
        </div>
      </div>
      <div class="task-hero-meta">
        ${f.Location ? `<div class="task-hero-meta-item">📍 <strong>${esc(f.Location)}</strong></div>` : ''}
        ${f['Skills Required'] ? `<div class="task-hero-meta-item">🛠 ${esc(f['Skills Required'])}</div>` : ''}
        <div class="task-hero-meta-item">🗓 <strong>${totalSlots}</strong> time slot${totalSlots !== 1 ? 's' : ''} available</div>
      </div>
    </div>

    ${totalSlots ? `<div class="section-label">Choose a Time Slot</div><div class="slot-grid" id="slotGrid">${allSlots.map(renderSlotCard).join('')}</div>` : '<div style="text-align:center;padding:40px;color:var(--text-muted)">No time slots have been added to this task yet.</div>'}

    <div class="form-card" id="signupForm">
      <div class="form-card-title">Complete Your Sign-Up</div>
      <div class="form-card-subtitle">Fill in your contact info and confirm your spot.</div>
      <div class="slot-selected-banner" id="selectedBanner">
        <div class="ssb-label">Signing up for</div>
        <div class="ssb-value" id="selectedBannerText">—</div>
      </div>
      <form id="volunteerForm" onsubmit="handleSubmit(event)">
        <div class="form-grid">
          <div class="form-group">
            <label>First Name<span class="req">*</span></label>
            <input type="text" name="firstName" required placeholder="Jane">
          </div>
          <div class="form-group">
            <label>Last Name<span class="req">*</span></label>
            <input type="text" name="lastName" required placeholder="Smith">
          </div>
          <div class="form-group full">
            <label>Email Address<span class="req">*</span></label>
            <input type="email" name="email" required placeholder="jane@example.com">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="(555) 000-0000">
          </div>
          <div class="form-group">
            <label>Preferred Contact Method<span class="req">*</span></label>
            <select name="contact" required>
              <option value="">Select…</option>
              <option value="Email">Email</option>
              <option value="Text/SMS">Text / SMS</option>
              <option value="Phone Call">Phone Call</option>
              <option value="WhatsApp">WhatsApp</option>
              <option value="Facebook Messenger">Facebook Messenger</option>
              <option value="Snapchat">Snapchat</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-submit" id="submitBtn">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>
            Confirm Sign-Up
          </button>
          <button type="button" class="btn-cancel" onclick="cancelForm()">Cancel</button>
        </div>
      </form>
    </div>

    <div class="confirm-card" id="confirmCard">
      <div class="confirm-icon">✅</div>
      <div class="confirm-title">You're signed up!</div>
      <div class="confirm-body" id="confirmTaskName"></div>
      <div class="confirm-detail" id="confirmDetail"></div>
      <div class="confirm-sub">You will receive reminders via your preferred contact method.<br>Thank you for volunteering!</div>
      <button class="btn-new" onclick="signUpAgain()">Sign Up for Another Slot</button>
    </div>`;
}

function renderSlotCard(slot) {
  const f = slot.fields;
  const need  = parseInt(f['Volunteers Needed']) || 0;
  const have  = slotSignupCounts[slot.id] || 0;
  const avail = Math.max(0, need - have);
  const full  = avail <= 0 && need > 0;
  const startD = new Date(f['Start Date/Time']);
  const endD   = new Date(f['End Date/Time']);

  const dateStr = isNaN(startD) ? '—' : startD.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  const startT  = isNaN(startD) ? '—' : startD.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  const endT    = isNaN(endD)   ? '—' : endD.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });

  return `
  <div class="slot-card ${full ? 'slot-full' : ''}" id="slotcard-${slot.id}">
    ${full ? '<div class="full-badge">Full</div>' : ''}
    <div class="slot-date">${dateStr}</div>
    <div class="slot-time">${startT} – ${endT}</div>
    <div class="slot-label-text">${esc(f['Slot Label'] || '')}</div>
    <div class="slot-avail">
      <div class="avail-dot ${full ? 'dot-full' : 'dot-open'}"></div>
      <span style="color:${full ? 'var(--orange)' : 'var(--green)'}; font-weight:600;">
        ${full ? 'No spots available' : `${avail} spot${avail !== 1 ? 's' : ''} available`}
      </span>
    </div>
    <button class="slot-btn ${full ? 'slot-btn-full' : 'slot-btn-open'}"
      ${full ? 'disabled' : `onclick="selectSlot('${slot.id}','${esc(f['Slot Label']||'')}','${dateStr}','${startT} – ${endT}')"`}>
      ${full ? 'Full' : 'Sign Up'}
    </button>
  </div>`;
}

function selectSlot(slotId, label, date, time) {
  selectedSlot = slotId;
  // Deselect others
  document.querySelectorAll('.slot-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('slotcard-' + slotId);
  if (card) card.classList.add('selected');
  document.getElementById('selectedBannerText').textContent = `${label}  •  ${date}  •  ${time}`;
  const form = document.getElementById('signupForm');
  form.classList.add('visible');
  form.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function cancelForm() {
  selectedSlot = null;
  document.querySelectorAll('.slot-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('signupForm').classList.remove('visible');
  document.getElementById('volunteerForm').reset();
}

async function handleSubmit(e) {
  e.preventDefault();
  if (!selectedSlot) return;
  const fd = new FormData(e.target);
  const firstName  = fd.get('firstName').trim();
  const lastName   = fd.get('lastName').trim();
  const email      = fd.get('email').trim();
  const phone      = fd.get('phone').trim();
  const contact    = fd.get('contact');

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:17px;height:17px;border-width:2px;margin:0;"></div> Saving…';

  try {
    // 1. Create volunteer record
    const vol = await atPost(T_VOLS, {
      'First Name': firstName,
      'Last Name':  lastName,
      'Email':      email,
      'Phone':      phone,
      'Preferred Contact': contact,
      'Active':     true
    });

    // 2. Create signup record with Time Slot link
    await atPost(T_SIGNUPS, {
      'Volunteer':   [vol.id],
      'Time Slot':   [selectedSlot],
      'Status':      'Confirmed',
      'Signup Date': new Date().toISOString().slice(0,10)
    });

    // 3. Update slot count locally
    slotSignupCounts[selectedSlot] = (slotSignupCounts[selectedSlot] || 0) + 1;

    // 4. Show confirmation
    const banner = document.getElementById('selectedBannerText').textContent;
    document.getElementById('signupForm').classList.remove('visible');
    const cc = document.getElementById('confirmCard');
    document.getElementById('confirmTaskName').textContent = taskData.fields['Task Name'] || 'Task';
    document.getElementById('confirmDetail').innerHTML = `
      <div class="confirm-detail-row"><span class="icon">📅</span><span>${banner.replace(' • ', '</span><br><span style="margin-left:26px;">').replace(' • ', ' &nbsp;•&nbsp; ')}</span></div>
      <div class="confirm-detail-row" style="margin-top:8px;"><span class="icon">📬</span><span>Reminders via <strong>${esc(contact)}</strong> to <strong>${esc(email || phone)}</strong></span></div>`;
    cc.classList.add('visible');
    cc.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch(err) {
    btn.disabled = false;
    btn.innerHTML = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> Confirm Sign-Up`;
    alert('Could not save your sign-up: ' + err.message + '\n\nPlease try again or contact your coordinator.');
  }
}

function signUpAgain() {
  document.getElementById('confirmCard').classList.remove('visible');
  document.getElementById('volunteerForm').reset();
  selectedSlot = null;
  // Re-render slot cards with updated counts
  const grid = document.getElementById('slotGrid');
  if (grid) grid.innerHTML = allSlots.map(renderSlotCard).join('');
}

function showError(title, body) {
  document.getElementById('mainContent').innerHTML = `
    <div class="error-card">
      <div class="error-title">⚠ ${esc(title)}</div>
      <p>${esc(body)}</p>
    </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
